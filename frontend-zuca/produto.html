<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Produto</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header class="header">
  <div class="container">

    <div class="logo-area">
      <img src="img/logo/logo.png" alt="Zuca">
      <div class="text">
        <h1>Zuca Personalizados</h1>
        <span>Personalizados que fazem a diferença</span>
      </div>
    </div>

    <nav class="menu">
      <a href="/">Início</a>
      <a href="/#produtos">Produtos</a>
      <a href="/#sobre">Sobre</a>
      <a href="/#contato">Contato</a>
    </nav>

    <a href="https://wa.me/5567984381778" class="btn-whatsapp">
      WhatsApp
    </a>

  </div>
</header>

<section class="produto-detalhe">

  <div class="produto-container">

    <!-- ESQUERDA -->
    <div class="galeria">

      <div class="miniaturas"></div>
      
      <div class="imagem-container">
        <img id="imagem-principal" src="">
      </div>
  
    </div>
  
    <!-- DIREITA -->
    <div class="info">
  
      <h1 id="nome"></h1>
  
      <p class="preco" id="preco"></p>
  
      <p class="descricao" id="descricao"></p>
  
      <button id="btn-adicionar-carrinho" class="btn-carrinho">
        Adicionar ao carrinho
      </button>
  
    </div>
  
  </div>

  <!-- DESCRIÇÃO GRANDE -->
  <div class="descricao-longa">
    <h2>Descrição do produto</h2>
    <p id="descricao-completa"></p>
  </div>

</section>
  
<script type="module" src="js/produto.js"></script>
  
</body>
</html>
