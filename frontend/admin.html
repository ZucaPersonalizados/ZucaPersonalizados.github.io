<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin • Zuca Personalizados</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Mulish:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary: #f4efe9;
      --bg-secondary: #ffffff;
      --text-primary: #1f1a17;
      --text-secondary: #6d665f;
      --border-color: #e6ddd1;
      --accent: #b57a4a;
      --accent-dark: #975f34;
      --success: #1f8f4f;
      --warning: #f39c12;
      --error: #e74c3c;
      --info: #3498db;
      --radius: 14px;
      --shadow: 0 18px 36px rgba(37, 24, 14, 0.08);
    }

    html, body {
      height: 100%;
      font-family: "Mulish", "Segoe UI", sans-serif;
      background:
        radial-gradient(1200px 380px at 100% 0%, rgba(181, 122, 74, 0.1), transparent 55%),
        linear-gradient(180deg, #f8f3ee 0%, #f3ece6 52%, #f2ebe4 100%);
      color: var(--text-primary);
    }

    body { display: flex; flex-direction: column; }

    .header {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-color);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 8px 24px rgba(37, 24, 14, 0.08);
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(4px);
    }

    .header h1 {
      font-size: 30px;
      line-height: 1;
      font-family: "DM Serif Display", serif;
      letter-spacing: 0.2px;
      color: #1f3852;
    }

    .header-actions { display: flex; gap: 12px; align-items: center; }

    .btn {
      padding: 10px 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 700;
      font-size: 14px;
      transition: all 0.2s ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #c58b58);
      color: #fff;
      box-shadow: 0 8px 18px rgba(151, 95, 52, 0.28);
    }
    .btn-primary:hover {
      background: linear-gradient(135deg, var(--accent-dark), #a66d3e);
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: var(--bg-primary);
      color: var(--text-primary);
      border: 1px solid var(--border-color);
    }

    .btn-secondary:hover { background: var(--border-color); }
    .btn-danger { background: var(--error); color: #fff; }

    .container {
      flex: 1;
      padding: 24px;
      max-width: 1400px;
      margin: 0 auto;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 16px;
    }

    .stat-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: 0 8px 18px rgba(37, 24, 14, 0.06);
    }

    .stat-card h3 {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .stat-card .value {
      font-size: 34px;
      font-weight: 800;
      color: #1f3852;
      font-family: "DM Serif Display", serif;
      line-height: 1;
    }

    .panel {
      background: var(--bg-secondary);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid #eadfd4;
      overflow: hidden;
    }

    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border-color);
      background: var(--bg-secondary);
    }

    .tab {
      flex: 1;
      padding: 14px 16px;
      border: none;
      background: transparent;
      cursor: pointer;
      font-weight: 600;
      color: var(--text-secondary);
      border-bottom: 3px solid transparent;
      transition: all 0.2s ease;
    }

    .tab.active {
      color: #1f3852;
      border-bottom-color: var(--accent);
      background: linear-gradient(180deg, rgba(181, 122, 74, 0.11), rgba(181, 122, 74, 0));
    }
    .tab:hover { background: var(--bg-primary); }

    .tab-content { display: none; background: var(--bg-secondary); }
    .tab-content.active { display: block; }

    .table-wrapper { overflow-x: auto; padding: 20px; }

    table { width: 100%; border-collapse: collapse; font-size: 14px; }

    th {
      text-align: left;
      padding: 12px 8px;
      border-bottom: 2px solid var(--border-color);
      font-weight: 700;
      color: var(--text-secondary);
      background: var(--bg-primary);
      text-transform: uppercase;
      font-size: 12px;
      letter-spacing: 0.5px;
    }

    td { padding: 14px 8px; border-bottom: 1px solid var(--border-color); }
    tr:hover { background: var(--bg-primary); }

    .status-pill {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-weight: 600;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .status-pill.pendente { background: #fff3cd; color: #856404; }
    .status-pill.pagto { background: #d4edda; color: #155724; }
    .status-pill.em_producao { background: #d1ecf1; color: #0c5460; }
    .status-pill.enviado { background: #cce5ff; color: #004085; }
    .status-pill.entregue { background: #d4edda; color: #155724; }
    .status-pill.cancelado { background: #f8d7da; color: #721c24; }

    .table-actions { display: flex; gap: 8px; align-items: center; }
    .btn-small { padding: 4px 8px; font-size: 12px; border-radius: 6px; }

    .tab-inner { padding: 20px; display: grid; gap: 20px; }

    .card {
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      padding: 16px;
      background: #fff;
      box-shadow: 0 8px 16px rgba(37, 24, 14, 0.04);
    }

    .card h3 { margin-bottom: 12px; }

    .form-grid {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .field { display: grid; gap: 6px; }
    .field-full { grid-column: 1 / -1; }

    .field label { font-size: 13px; font-weight: 600; color: var(--text-secondary); }

    input, textarea, select {
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 10px 12px;
      font: inherit;
      background: #fff;
      color: var(--text-primary);
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: #bd885d;
      box-shadow: 0 0 0 3px rgba(181, 122, 74, 0.14);
    }

    textarea { min-height: 90px; resize: vertical; }

    .actions { display: flex; gap: 10px; flex-wrap: wrap; }

    .list-grid { display: grid; gap: 10px; }

    .item-card {
      border: 1px solid var(--border-color);
      border-radius: 10px;
      padding: 12px;
      background: var(--bg-primary);
      display: grid;
      gap: 8px;
    }

    .item-title { font-weight: 700; }
    .item-meta { color: var(--text-secondary); font-size: 13px; }

    .details-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      padding: 20px;
      z-index: 200;
      align-items: center;
      justify-content: center;
      overflow-y: auto;
    }

    .details-modal.active { display: flex; }

    .modal-content {
      background: var(--bg-secondary);
      border-radius: var(--radius);
      padding: 28px;
      max-width: 600px;
      width: 100%;
      max-height: 80vh;
      overflow-y: auto;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 12px;
    }

    .close-btn {
      background: none;
      border: none;
      font-size: 24px;
      color: var(--text-secondary);
      cursor: pointer;
      width: 32px;
      height: 32px;
    }

    .detail-item {
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 12px;
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border-color);
    }

    .detail-item:last-child { border-bottom: none; }

    .detail-label {
      font-weight: 700;
      color: var(--text-secondary);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .items-list {
      background: var(--bg-primary);
      padding: 12px;
      border-radius: 6px;
      margin: 8px 0;
    }

    .item-row {
      display: grid;
      grid-template-columns: 1fr 80px 60px;
      gap: 12px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border-color);
      align-items: center;
      font-size: 13px;
    }

    .item-row:last-child { border-bottom: none; }

    /* Anexos de personalização */
    .anexos-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
    }
    .anexo-card {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      background: #f5f8fa;
      border: 1px solid var(--border-color);
      border-radius: 10px;
      padding: 12px;
      min-width: 240px;
      max-width: 360px;
      flex: 1;
    }
    .anexo-preview {
      flex-shrink: 0;
      width: 80px;
      height: 80px;
      border-radius: 8px;
      overflow: hidden;
      background: #e9ecef;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border-color);
    }
    .anexo-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .anexo-preview-pdf {
      flex-direction: column;
      gap: 2px;
    }
    .anexo-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }
    .anexo-produto {
      font-weight: 600;
      font-size: 13px;
      color: var(--text-color);
    }
    .anexo-nome {
      font-size: 11px;
      color: var(--muted);
      word-break: break-all;
    }
    .anexo-btn-download {
      margin-top: 4px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      width: fit-content;
      text-decoration: none !important;
      font-size: 12px !important;
      padding: 5px 12px !important;
    }

    .login-page {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      background:
        radial-gradient(420px 280px at 10% 20%, rgba(31, 56, 82, 0.12), transparent 70%),
        radial-gradient(520px 280px at 90% 80%, rgba(181, 122, 74, 0.15), transparent 74%);
    }

    .login-card {
      background: var(--bg-secondary);
      border-radius: var(--radius);
      padding: 36px;
      max-width: 400px;
      width: 100%;
      box-shadow: var(--shadow);
      border: 1px solid #e7dbcf;
      position: relative;
      overflow: hidden;
    }

    .login-card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 6px;
      background: linear-gradient(90deg, #1f3852, #b57a4a 55%, #d3a273);
    }

    .login-card h1 {
      font-family: "DM Serif Display", serif;
      font-size: 48px;
      line-height: 0.95;
      margin-bottom: 20px;
      text-align: center;
      color: #1f3852;
    }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 14px; }

    .status-box {
      padding: 12px;
      border-radius: 6px;
      margin-top: 12px;
      font-size: 14px;
      display: none;
    }

    .status-box.error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    .status-box.ok { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }

    #status {
      color: var(--text-secondary);
      font-size: 13px;
      margin-top: 10px;
      border-left: 4px solid #d7c6b7;
      padding-left: 10px;
    }

    @media (max-width: 900px) {
      .form-grid { grid-template-columns: 1fr; }
      .table-wrapper { padding: 12px; }
      td, th { padding: 8px 4px; }
      .header h1 { font-size: 24px; }
      .login-card { padding: 28px 20px; }
      .login-card h1 { font-size: 40px; }
    }
  </style>
</head>
<body>
  <div id="login-wrapper" class="login-page">
    <div class="login-card">
      <h1>Zuca Admin</h1>
      <form id="form-login">
        <div class="form-group">
          <label>E-mail</label>
          <input id="login-email" type="email" placeholder="seu@email.com" required />
        </div>
        <div class="form-group">
          <label>Senha</label>
          <input id="login-senha" type="password" placeholder="Sua senha" required />
        </div>
        <button type="button" class="btn btn-primary" id="btn-login" style="width: 100%;">Entrar</button>
        <button type="button" class="btn btn-secondary" id="btn-esqueci-senha" style="width: 100%; margin-top: 8px;">Esqueci minha senha</button>
        <div id="login-status" class="status-box"></div>
      </form>
    </div>
  </div>

  <div id="admin-wrapper" style="display:none;">
    <header class="header">
      <h1>Zuca Personalizados • Painel Administrativo</h1>
      <div class="header-actions">
        <span id="user-info"></span>
        <button id="btn-logout" class="btn btn-secondary" type="button">Sair</button>
      </div>
    </header>

    <div class="container">
      <div class="dashboard-grid" id="dashboard-stats"></div>

      <div class="panel">
        <div class="tabs">
          <button class="tab active" data-tab="pedidos">Pedidos</button>
          <button class="tab" data-tab="produtos">Produtos</button>
          <button class="tab" data-tab="cupons">Cupons</button>
        </div>

        <div class="tab-content active" id="pedidos-tab">
          <div style="padding: 20px; border-bottom: 1px solid var(--border-color); display: flex; gap: 12px; flex-wrap: wrap;">
            <select id="filtro-status" style="padding: 8px 12px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 14px;">
              <option value="">Todos os status</option>
              <option value="pendente">Pendente</option>
              <option value="pagto">Pago</option>
              <option value="em_producao">Em produção</option>
              <option value="enviado">Enviado</option>
              <option value="entregue">Entregue</option>
              <option value="cancelado">Cancelado</option>
            </select>
            <button class="btn btn-secondary" id="btn-recarregar-pedidos" type="button">Recarregar</button>
          </div>
          <div class="table-wrapper">
            <table id="tabela-pedidos">
              <thead>
                <tr>
                  <th>ID Pedido</th>
                  <th>Cliente</th>
                  <th>Total</th>
                  <th>Status</th>
                  <th>Pagamento</th>
                  <th>Data</th>
                  <th>Ações</th>
                </tr>
              </thead>
              <tbody id="pedidos-list"></tbody>
            </table>
          </div>
        </div>

        <div class="tab-content" id="produtos-tab">
          <div class="tab-inner">
            <div class="card">
              <h3>Cadastro de Produto</h3>
              <form id="form-produto" class="form-grid">
                <div class="field">
                  <label for="id">ID do produto</label>
                  <input id="id" type="text" placeholder="ex: planner-a5-rose" required />
                </div>
                <div class="field">
                  <label for="nome">Nome</label>
                  <input id="nome" type="text" placeholder="Nome do produto" required />
                </div>

                <div class="field">
                  <label for="preco">Preço</label>
                  <input id="preco" type="text" placeholder="59,90" />
                </div>
                <div class="field">
                  <label for="estoque">Estoque</label>
                  <input id="estoque" type="number" min="0" step="1" placeholder="0" />
                </div>

                <div class="field">
                  <label for="categoria">Categoria</label>
                  <input id="categoria" type="text" />
                </div>
                <div class="field">
                  <label for="tipo">Tipo/Subcategoria</label>
                  <input id="tipo" type="text" />
                </div>

                <div class="field">
                  <label for="tamanho">Tamanho</label>
                  <input id="tamanho" type="text" />
                </div>
                <div class="field">
                  <label for="gramatura">Gramatura</label>
                  <input id="gramatura" type="text" />
                </div>

                <div class="field field-full">
                  <label for="link">Link de compra</label>
                  <input id="link" type="url" placeholder="https://..." />
                </div>

                <div class="field field-full">
                  <label for="imagens">URLs das imagens (separadas por vírgula)</label>
                  <input id="imagens" type="text" placeholder="https://.../1.jpg, https://.../2.jpg" />
                </div>

                <div class="field field-full">
                  <label for="descricaoCurta">Descrição curta</label>
                  <textarea id="descricaoCurta"></textarea>
                </div>

                <div class="field field-full">
                  <label for="descricaoLonga">Descrição longa</label>
                  <textarea id="descricaoLonga"></textarea>
                </div>

                <div class="field field-full" style="display:flex; align-items:center; gap:8px;">
                  <input id="personalizado" type="checkbox" style="width:auto;" />
                  <label for="personalizado" style="margin:0;">Produto personalizado?</label>
                </div>

                <div class="field field-full actions">
                  <button type="submit" class="btn btn-primary" id="btn-submit">Salvar produto</button>
                  <button type="button" class="btn btn-secondary" id="btn-novo">Novo</button>
                  <button type="button" class="btn btn-danger" id="btn-excluir" style="display:none;">Excluir</button>
                </div>
              </form>
              <p id="status">Pronto para cadastrar.</p>
            </div>

            <div class="card">
              <h3>Produtos cadastrados</h3>
              <div id="lista-produtos" class="list-grid"></div>
            </div>
          </div>
        </div>

        <div class="tab-content" id="cupons-tab">
          <div class="tab-inner">
            <div class="card">
              <h3>Novo cupom</h3>
              <form class="form-grid" id="form-cupom">
                <div class="field">
                  <label for="cupom-codigo">Código</label>
                  <input id="cupom-codigo" type="text" placeholder="BEMVINDO10" required />
                </div>
                <div class="field">
                  <label for="cupom-tipo">Tipo</label>
                  <select id="cupom-tipo">
                    <option value="percentual">Percentual (%)</option>
                    <option value="fixo">Valor fixo (R$)</option>
                  </select>
                </div>
                <div class="field">
                  <label for="cupom-valor">Valor</label>
                  <input id="cupom-valor" type="number" min="0" step="0.01" required />
                </div>
                <div class="field" style="display:flex; align-items:flex-end;">
                  <button type="submit" class="btn btn-primary">Salvar cupom</button>
                </div>
              </form>
            </div>

            <div class="card">
              <h3>Cupons cadastrados</h3>
              <div id="lista-cupons-admin" class="list-grid"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="details-modal" class="details-modal">
      <div class="modal-content">
        <div class="modal-header">
          <h2 id="modal-title">Detalhes do Pedido</h2>
          <button class="close-btn" onclick="fecharModal()">x</button>
        </div>
        <div id="modal-body"></div>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container" aria-live="polite"></div>
  <script type="module" src="js/admin.js"></script>
</body>
</html>
