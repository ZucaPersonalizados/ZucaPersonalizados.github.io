<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin • Zuca Personalizados</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-primary: #f8f7f5;
      --bg-secondary: #ffffff;
      --text-primary: #1f1a17;
      --text-secondary: #6d665f;
      --border-color: #e8e1d8;
      --accent: #c98d59;
      --accent-dark: #b8825a;
      --success: #1f8f4f;
      --warning: #f39c12;
      --error: #e74c3c;
      --info: #3498db;
      --radius: 12px;
      --shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
    }

    body {
      display: flex;
      flex-direction: column;
    }

    .header {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-color);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: var(--shadow);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header h1 {
      font-size: 24px;
      font-weight: 700;
    }

    .header-actions {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      transition: all 0.2s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
    }

    .btn-primary:hover {
      background: var(--accent-dark);
    }

    .btn-secondary {
      background: var(--bg-primary);
      color: var(--text-primary);
      border: 1px solid var(--border-color);
    }

    .btn-secondary:hover {
      background: var(--border-color);
    }

    .btn-logout {
      background: var(--error);
      color: white;
    }

    .btn-logout:hover {
      opacity: 0.9;
    }

    .container {
      flex: 1;
      padding: 24px;
      max-width: 1400px;
      margin: 0 auto;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 16px;
    }

    .stat-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
    }

    .stat-card h3 {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .stat-card .value {
      font-size: 32px;
      font-weight: 700;
      color: var(--accent);
    }

    .tabs {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border-color);
      background: var(--bg-secondary);
      border-radius: var(--radius) var(--radius) 0 0;
      overflow: hidden;
    }

    .tab {
      flex: 1;
      padding: 14px 16px;
      border: none;
      background: transparent;
      cursor: pointer;
      font-weight: 600;
      color: var(--text-secondary);
      border-bottom: 3px solid transparent;
      transition: all 0.2s;
    }

    .tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .tab:hover {
      background: var(--bg-primary);
    }

    .tab-content {
      display: none;
      background: var(--bg-secondary);
      border-radius: 0 0 var(--radius) var(--radius);
      box-shadow: var(--shadow);
    }

    .tab-content.active {
      display: block;
    }

    .table-wrapper {
      overflow-x: auto;
      padding: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    th {
      text-align: left;
      padding: 12px 8px;
      border-bottom: 2px solid var(--border-color);
      font-weight: 700;
      color: var(--text-secondary);
      background: var(--bg-primary);
      text-transform: uppercase;
      font-size: 12px;
      letter-spacing: 0.5px;
    }

    td {
      padding: 14px 8px;
      border-bottom: 1px solid var(--border-color);
    }

    tr:hover {
      background: var(--bg-primary);
    }

    .status {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-weight: 600;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .status.pendente {
      background: #fff3cd;
      color: #856404;
    }

    .status.pagto {
      background: #d4edda;
      color: #155724;
    }

    .status.em_producao {
      background: #d1ecf1;
      color: #0c5460;
    }

    .status.enviado {
      background: #cce5ff;
      color: #004085;
    }

    .status.entregue {
      background: #d4edda;
      color: #155724;
    }

    .status.cancelado {
      background: #f8d7da;
      color: #721c24;
    }

    .table-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .btn-small {
      padding: 4px 8px;
      font-size: 12px;
      border-radius: 6px;
    }

    .select-status {
      padding: 6px 8px;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      font-size: 12px;
      background: var(--bg-primary);
      cursor: pointer;
    }

    .details-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      padding: 20px;
      z-index: 200;
      align-items: center;
      justify-content: center;
      overflow-y: auto;
    }

    .details-modal.active {
      display: flex;
    }

    .modal-content {
      background: var(--bg-secondary);
      border-radius: var(--radius);
      padding: 28px;
      max-width: 600px;
      width: 100%;
      max-height: 80vh;
      overflow-y: auto;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 12px;
    }

    .modal-header h2 {
      font-size: 20px;
    }

    .close-btn {
      background: none;
      border: none;
      font-size: 24px;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 0;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .close-btn:hover {
      color: var(--text-primary);
    }

    .detail-item {
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 12px;
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border-color);
    }

    .detail-item:last-child {
      border-bottom: none;
    }

    .detail-label {
      font-weight: 700;
      color: var(--text-secondary);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .detail-value {
      color: var(--text-primary);
    }

    .items-list {
      background: var(--bg-primary);
      padding: 12px;
      border-radius: 6px;
      margin: 8px 0;
    }

    .item-row {
      display: grid;
      grid-template-columns: 1fr 80px 60px;
      gap: 12px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border-color);
      align-items: center;
      font-size: 13px;
    }

    .item-row:last-child {
      border-bottom: none;
    }

    #login-wrapper { display: flex; }
    #admin-wrapper { display: none; }

    .login-page {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .login-card {
      background: var(--bg-secondary);
      border-radius: var(--radius);
      padding: 40px;
      max-width: 400px;
      width: 100%;
      box-shadow: var(--shadow);
    }

    .login-card h1 {
      font-size: 28px;
      margin-bottom: 20px;
      text-align: center;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
      font-size: 14px;
    }

    .form-group input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      font-size: 14px;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(201,141,89,0.1);
    }

    .status-box {
      padding: 12px;
      border-radius: 6px;
      margin-top: 12px;
      font-size: 14px;
    }

    .status-box.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }

    .status-box.ok {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }

    @media (max-width: 768px) {
      .dashboard-grid {
        grid-template-columns: 1fr;
      }

      .header {
        flex-direction: column;
        gap: 12px;
        align-items: flex-start;
      }

      .table-wrapper {
        font-size: 12px;
        padding: 12px;
      }

      td, th {
        padding: 8px 4px;
      }

      .item-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Mulish:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="login-wrapper" class="login-page">
    <div class="login-card">
      <h1>Zuca Admin</h1>
      <form id="form-login">
        <div class="form-group">
          <label>E-mail</label>
          <input id="login-email" type="email" placeholder="seu@email.com" required />
        </div>
        <div class="form-group">
          <label>Senha</label>
          <input id="login-senha" type="password" placeholder="Sua senha" required />
        </div>
        <button type="button" class="btn btn-primary" id="btn-login" style="width: 100%;">Entrar</button>
        <button type="button" class="btn btn-secondary" id="btn-esqueci-senha" style="width: 100%; margin-top: 8px;">Esqueci minha senha</button>
        <div id="login-status" class="status-box"></div>
      </form>
    </div>
  </div>

  <div id="admin-wrapper">
    <div class="top-ribbon">
      Painel Administrativo • Zuca Personalizados
    </div>

    <header class="header">
      <div class="container header-shell">
        <div class="logo-area">
          <img src="img/logo/logo.png" alt="Zuca Personalizados">
          <div class="text">
            <h1>Zuca Personalizados</h1>
            <span>Painel Administrativo</span>
          </div>
        </div>

        <nav class="menu">
          <a href="index.html">Início</a>
          <a href="index.html#produtos">Produtos</a>
          <a href="index.html#sobre">Sobre</a>
          <a href="index.html#contato">Contato</a>
        </nav>

        <div class="header-actions">
          <div class="avatar-menu">
            <button id="btn-avatar" type="button" class="avatar-btn" aria-haspopup="true" aria-expanded="false">
              <span id="user-info">Admin</span>
            </button>
            <div id="avatar-dropdown" class="avatar-dropdown">
              <button id="btn-logout" type="button">Sair</button>
            </div>
          </div>
        </div>
      </div>
    </header>

    <div class="container">
      <div class="dashboard-grid" id="dashboard-stats"></div>

      <div style="background: var(--bg-secondary); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden;">
        <div class="tabs">
          <button class="tab active" data-tab="pedidos">📦 Pedidos</button>
          <button class="tab" data-tab="produtos">📚 Produtos</button>
          <button class="tab" data-tab="cupons">🎁 Cupons</button>
        </div>

        <!-- TAB: PEDIDOS -->
        <div class="tab-content active" id="pedidos-tab">
          <div style="padding: 20px; border-bottom: 1px solid var(--border-color); display: flex; gap: 12px; flex-wrap: wrap;">
            <select id="filtro-status" style="padding: 8px 12px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 14px;">
              <option value="">Todos os status</option>
              <option value="pendente">Pendente</option>
              <option value="pagto">Pago</option>
              <option value="em_producao">Em produção</option>
              <option value="enviado">Enviado</option>
              <option value="entregue">Entregue</option>
              <option value="cancelado">Cancelado</option>
            </select>
            <button class="btn btn-secondary" id="btn-recarregar-pedidos">🔄 Recarregar</button>
          </div>
          <div class="table-wrapper">
            <table id="tabela-pedidos">
              <thead>
                <tr>
                  <th>ID Pedido</th>
                  <th>Cliente</th>
                  <th>Total</th>
                  <th>Status</th>
                  <th>Pagamento</th>
                  <th>Data</th>
                  <th>Ações</th>
                </tr>
              </thead>
              <tbody id="pedidos-list"></tbody>
            </table>
          </div>
        </div>

        <!-- TAB: PRODUTOS -->
        <div class="tab-content" id="produtos-tab">
          <div style="padding: 20px;">
            <div id="produtos-list"></div>
          </div>
        </div>

        <!-- TAB: CUPONS -->
        <div class="tab-content" id="cupons-tab">
          <div style="padding: 20px;">
            <div id="cupons-list"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Modal de detalhes -->
    <div id="details-modal" class="details-modal">
      <div class="modal-content">
        <div class="modal-header">
          <h2 id="modal-title">Detalhes do Pedido</h2>
          <button class="close-btn" onclick="fecharModal()">✕</button>
        </div>
        <div id="modal-body"></div>
      </div>
    </div>
  </div>

  <script type="module" src="js/admin.js"></script>
</body>
</html>
